name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build -trimpath -ldflags="-s -w" ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: smoke test against fixtures
        if: matrix.os != 'windows-latest'
        run: |
          go build -o promptlock ./cmd/promptlock
          ./promptlock list --cwd tests/fixtures
          ./promptlock validate --cwd tests/fixtures
          ./promptlock eval --cwd tests/fixtures/mock-eval

      - name: smoke test against fixtures (windows)
        if: matrix.os == 'windows-latest'
        run: |
          go build -o promptlock.exe ./cmd/promptlock
          ./promptlock.exe list --cwd tests/fixtures
          ./promptlock.exe validate --cwd tests/fixtures
          ./promptlock.exe eval --cwd tests/fixtures/mock-eval

  binary-size:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go build -trimpath -ldflags="-s -w" -o promptlock ./cmd/promptlock
      - run: |
          size=$(stat -c%s promptlock)
          echo "binary size: $size bytes"
          if [ "$size" -gt 15728640 ]; then
            echo "::error::Binary exceeds 15 MB"
            exit 1
          fi
