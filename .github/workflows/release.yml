name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # to upload release assets

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          name="promptlock-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build \
            -trimpath \
            -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME}" \
            -o "dist/$name" \
            ./cmd/promptlock
          (cd dist && shasum -a 256 "$name" > "$name.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: promptlock-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list artifacts
        run: ls -la dist

      - name: aggregate sha256
        run: |
          (cd dist && cat *.sha256 > checksums.txt)
          rm dist/*.sha256

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
